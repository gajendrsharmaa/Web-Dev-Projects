<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Navbar</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<nav>

<div class="logo">
<img src="UE_Site-Logo-1.png" alt="UltraEdit Logo">
</div>

<input type="checkbox" id="menu-toggle">

<label for="menu-toggle" class="menu-icon">
☰
</label>

<ul class="nav-links">

<li>
<a href="#">Products <img class="dropdown-icon" src="down-chevron.png"></a>
</li>

<li>
<a href="#">Buy <img class="dropdown-icon" src="down-chevron.png"></a>
</li>

<li>
<a href="#">Renew</a>
</li>

<li>
<a href="#">Support <img class="dropdown-icon" src="down-chevron.png"></a>
</li>

<li>
<a href="#">Learn <img class="dropdown-icon" src="down-chevron.png"></a>
</li>

<li>
<a href="#">Company <img class="dropdown-icon" src="down-chevron.png"></a>
</li>

</ul>

<div class="download">

<button class="download-btn">
Download
</button>

<button class="language">
<img src="globe.png" alt="">
English
</button>

<span class="search">
<img src="search-interface-symbol.png" alt="">
</span>

</div>

</nav>

</header>

</body>
</html>
